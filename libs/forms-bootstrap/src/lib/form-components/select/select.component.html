@if (control) {
  @if (selectConfig.labelLocation === 'top') {
    <div class="mb-3">
      <label [class.text-danger]="!!errorMessage" class="form-label" for="{{id}}-top">{{ selectConfig.label }}</label>
      <select [attr.aria-label]="selectConfig.label" 
              [class.border-danger]="!!errorMessage" 
              [formControl]="control"
              class="form-select"
              id="{{id}}-top"
              [attr.aria-describedby]="errorMessage ? id + '-error' : null">
        @if (selectConfig.placeholder) {
          <option [disabled]="true" [value]="selectConfig.placeHolderValue || ''">{{ selectConfig.placeholder }}</option>
        }
        @for (option of options(); track option.id) {
          <option [disabled]="!!option.disabled" [value]="option.id">
            {{ option.label }}
          </option>
        }
      </select>
      @if (errorMessage) {
        <div class="text-danger mt-1" id="{{id}}-error" style="font-size: 0.875rem;">
          {{ errorMessage }}
        </div>
      }
    </div>
  } @else {
    <div class="mb-3 row">
      <label [class.text-danger]="!!errorMessage" class="col-sm-2 col-form-label"
             for="{{id}}-left">{{ selectConfig.label }}</label>
      <div class="col-sm-10">
        <select [attr.aria-label]="selectConfig.label" 
                [class.border-danger]="!!errorMessage" 
                [formControl]="control"
                class="form-select"
                id="{{id}}-left"
                [attr.aria-describedby]="errorMessage ? id + '-error' : null">
          @if (selectConfig.placeholder) {
            <option [disabled]="true" [value]="selectConfig.placeHolderValue || ''">{{ selectConfig.placeholder }}</option>
          }
          @for (option of options(); track option.id) {
            <option [disabled]="!!option.disabled" [value]="option.id">
              {{ option.label }}
            </option>
          }
        </select>
        @if (errorMessage) {
          <div class="text-danger mt-1" id="{{id}}-error" style="font-size: 0.875rem;">
            {{ errorMessage }}
          </div>
        }
      </div>
    </div>
  }
}
