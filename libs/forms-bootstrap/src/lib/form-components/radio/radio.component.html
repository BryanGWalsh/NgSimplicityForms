@if (control) {
  <div role="radiogroup"
       [attr.aria-labelledby]="radioConfig.label ? id + '-label' : null"
       [attr.aria-describedby]="errorMessage ? id + '-error' : null"
       class="mb-3">
    <div [class.d-flex]="radioConfig.alignment==='horizontal'">
      @if (!!radioConfig.label) {
        <div [class.text-danger]="!!errorMessage" class="form-label me-2 pt-0" id="{{id}}-label">
          {{ radioConfig.label }}
        </div>
      }
      @for (option of options(); track option.id) {
        <div [class.form-check-inline]="radioConfig.alignment==='horizontal'"
             [class.me-2]="radioConfig.alignment==='horizontal'"
             class="form-check">
          <input [class.border-danger]="!!errorMessage" 
                 [formControl]="control" 
                 value="{{option.id}}" 
                 class="form-check-input"
                 id="{{id}}{{option.id}}" 
                 type="radio">
          <label [class.text-danger]="!!errorMessage" class="form-check-label"
                 for="{{id}}{{option.id}}">{{ option.label }}</label>
        </div>
      }
    </div>
    @if (errorMessage) {
      <div class="text-danger mt-1" id="{{id}}-error" style="font-size: 0.875rem;">
        {{ errorMessage }}
      </div>
    }
  </div>
}
