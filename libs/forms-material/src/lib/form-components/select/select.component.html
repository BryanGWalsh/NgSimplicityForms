@if (control) {
  <mat-form-field class="w-100 mb-2" appearance="outline">
    @if (selectConfig.label) {
      <mat-label>{{ selectConfig.label }}</mat-label>
    }
    <mat-select [formControl]="control" [attr.aria-label]="selectConfig.label" [errorStateMatcher]="matcher">
      @if (selectConfig.placeholder) {
        <mat-option [disabled]="true" [value]="selectConfig.placeHolderValue || ''">
          {{ selectConfig.placeholder }}
        </mat-option>
      }
      @for (option of options(); track option.id) {
        <mat-option [disabled]="!!option.disabled" [value]="option.id">
          {{ option.label }}
        </mat-option>
      }
    </mat-select>
    @if (errorMessage) {
      <mat-error>{{ errorMessage }}</mat-error>
    }
  </mat-form-field>
}
