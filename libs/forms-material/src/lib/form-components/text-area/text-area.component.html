@if (control) {
  <mat-form-field class="w-100 mb-2" appearance="outline">
    @if (config.label) {
      <mat-label>{{ config.label }}</mat-label>
    }
    <textarea matInput [formControl]="control" [placeholder]="config.placeholder || ''" [rows]="config.rows || 3"></textarea>
    @if (errorMessage) {
      <mat-error>{{ errorMessage }}</mat-error>
    }
  </mat-form-field>
}
