@if (control) {
  <div class="mb-3">
    <mat-checkbox [formControl]="control" [aria-describedby]="errorMessage ? id + '-error' : ''">
      {{ config.label }}
    </mat-checkbox>
    @if (errorMessage) {
      <div class="mt-1 ms-4" id="{{id}}-error" style="font-size: 0.75rem; color: #f44336;">{{ errorMessage }}</div>
    }
  </div>
}
